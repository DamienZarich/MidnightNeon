<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="index.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MidnightLights</title>
    <script src="movement.js" defer></script>
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
    <link rel="manifest" href="/site.webmanifest">
</head>
<body>
   <div class="Scene">
   <div class="sky">
    <div class="stars"></div>
 </div>
 <h1 class="Middle"></h1>  
 <div class="Sun"></div>
 <div class="Horizon"></div>
 <div class="GridLines">
    <div class="Floor"></div>
    <div class="Reflection"></div>
 </div>
 <div class="Spaceship-Container">
   <div class="SpaceshipOutline"></div>
   <div class="Spaceship"></div>
   <div class="thruster"></div>
   <div class="cockPit"></div>
 </div>
 <canvas id="myCanvas" width="800" height="600"></canvas>

<div id="gameOverScreen" style="display: none; position: absolute; top: 0; left: 0; width: 800px; height: 600px; background: rgba(0, 0, 0, 0.7); color: white; text-align: center; padding-top: 200px;">
    <h1>GAME OVER</h1>
    <p id="highScoreDisplay">High Score: 0</p>
    <button onclick="restartGame()">Restart</button>
</div>
</body> 
</html>
